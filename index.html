<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bored. Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bored: {
                neon: '#D7FF00',
                black: '#000000',
                gray: {
                  50: '#F9FAFB', // Ultra-light background
                  100: '#F3F4F6',
                  200: '#E5E7EB', // Border
                  300: '#D1D5DB',
                  500: '#6B7280',
                  800: '#1F2937',
                  900: '#111827',
                }
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(to bottom, #FAFAFA 0%, #F5F5F5 100%);
        min-height: 100vh;
      }
      /* Custom scrollbar for sidebar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #E5E7EB;
        border-radius: 3px;
      }
    </style>
  <!-- Capture password-recovery flag BEFORE any module JS runs.
       Supabase's PKCE detectSessionInUrl wipes the query string asynchronously
       but ES module evaluation order is non-trivial. Storing in sessionStorage
       here (plain sync script) guarantees we always capture it. -->
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var h = new URLSearchParams(window.location.hash.slice(1));
      if (p.get('type') === 'recovery' || h.get('type') === 'recovery') {
        sessionStorage.setItem('bored_pw_recovery', '1');
      }
    })();
  </script>

}
</script>
